<div class="page-wrapper h-100 p-2">
  <div class="d-flex align-items-center">
    <div class="img-wrapper d-flex align-items-center justify-content-center me-4">
      <img loading="lazy" class="img" src="/icons/job-seeker.png" alt="experience">
    </div>
    <p>{{ 'experience' | translateFallback: 'Kariera' }}</p>
  </div>
  <hr>
  <div class="body-scroll d-flex flex-column">
    @for (item of careerList; track $index) {
      <div class="d-flex align-items-start justify-content-between mt-1 mb-1">
        <div class="img-wrapper-experience d-flex align-items-center justify-content-center">
          <img loading="lazy" src="/icons/job.png" class="experience-img" alt="job-icon">
        </div>
        <div class="d-flex flex-column ms-3 p-1">
          <p>{{ item.companyName | translateFallback: item.companyNameFallback }}</p>
          <p>{{ item.jobPosition | translateFallback: item.jobPositionFallback }}</p>
          <p>{{ item.description | translateFallback: item.description }}</p>
        </div>
      </div>
      <hr style="width: 90%">
    }
    <div class="d-flex align-items-center justify-content-center mt-4">
      <button type="button" class="resume-img-wrapper d-flex align-items-center justify-content-center" aria-label="resume-download" (click)="downloadResume()">
        <img loading="lazy" src="/icons/resume.png" alt="resume-icon">
      </button>
    </div>
  </div>
</div>
