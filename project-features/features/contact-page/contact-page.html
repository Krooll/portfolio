<div class="page-wrapper h-100 px-4 py-3">
  <div class="d-flex align-items-center">
    <div class="img-wrapper d-flex align-items-center justify-content-center me-4">
      <img src="paper-plane.png" alt="paper-plane">
    </div>
    <p>{{ 'contact' | translateFallback: 'Kontakt' }}</p>
  </div>
  <hr>
  <div class="body-scroll d-flex align-items-center justify-content-between flex-wrap mt-4">
    <form class="contact-body-side side-a  d-flex flex-column align-items-center justify-content-center" (ngSubmit)="onSubmit()" [formGroup]="formGroup()!">
      <h2>{{ 'contactPage.formTitle' | translateFallback: 'Skontaktujmy się' }}</h2>
      <div class="d-flex flex-column mt-4 w-100">
        @let emailAddress = 'emailAddress';
        <label [for]="emailAddress">
          {{ 'contactPage.form.labels.email' | translateFallback: 'Adres email' }}
        </label>
        <input class="mt-1" [formControlName]="emailAddress" type="email" [placeholder]="'contactPage.form.placeholders.email' | translateFallback: 'Wpisz swój adres email'">
      </div>
      <div class="d-flex flex-column mt-2 w-100">
        @let message = 'message';
        <textarea [formControlName]="message" [placeholder]="'contactPage.form.placeholders.message' | translateFallback: 'Wpisz swój adres email'"></textarea>
      </div>
      <button aria-label="Submit form" type="submit" class="mt-3 p-1 submit-button">
        {{ 'contactPage.formButton' | translateFallback: 'Wyślij' }}
      </button>
    </form>
    <div class="contact-body-side side-b d-flex flex-column align-items-center justify-content-center">
      <div class="d-flex justify-content-center w-100 mb-4">
        <iframe
          title="Google map"
          class="iframe-wrapper"
          style="border:0; border-radius: 0.5rem"
          loading="lazy"
          allowfullscreen
          referrerpolicy="no-referrer-when-downgrade"
          src="https://www.google.com/maps?q=Bieruń%20Stary%2C%20Polska&output=embed">
        </iframe>
      </div>
      <div class="d-flex">
        @for(item of contactButtonsList; track $index) {
          <button [aria-label]="item.alt" type="button" class="social-buttons me-3 ms-3" (click)="routeToSocialPage(item.url)">
            <img class="social-img" [src]="item.icon" [alt]="item.alt">
          </button>
        }
      </div>
    </div>
  </div>
</div>
