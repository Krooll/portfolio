<div class="page-wrapper h-100 px-4 py-3">
  <div class="d-flex align-items-center">
    <div class="img-wrapper d-flex align-items-center justify-content-center me-4">
      <img src="paper-plane.png" alt="paper-plane">
    </div>
    <p>{{ 'contactPage.contact' | translateFallback: 'Kontakt' }}</p>
  </div>
  <hr>
  <div class="body-scroll d-flex align-items-center justify-content-between flex-wrap mt-4">
    <ng-form class="contact-body-side side-a  d-flex flex-column align-items-center justify-content-center" [formGroup]="formGroup()!">
      <h2>Skontaktujmy sie</h2>
      <div class="d-flex flex-column mt-4 w-100">
        @let mailAddress = 'mailAddress';
        <label [for]="mailAddress">
          Adres email
        </label>
        <input [name]="mailAddress" type="text" [placeholder]="'Wpisz swoj adres email...'">
      </div>
      <div class="d-flex flex-column mt-2 w-100">
        @let message = 'message';
        <textarea [name]="message" [placeholder]="'Napisz wiadomość...'"></textarea>
      </div>
      <button type="submit" class="mt-3 p-1 submit-button">
        Wyslij
      </button>
    </ng-form>
    <div class="contact-body-side side-b d-flex align-items-center justify-content-center">
      @for(item of contactButtonsList; track $index) {
        <button type="button" class="social-buttons me-3 ms-3" (click)="routeToSocialPage(item.url)">
          <img class="social-img" [src]="item.icon" [alt]="item.alt">
        </button>
      }
    </div>
  </div>
</div>
