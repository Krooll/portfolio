<header class="header-wrapper">
  <div class="d-flex align-items-center me-4">
    @if (_themeService.currentTheme() === ThemeType.Dark) {
      <img loading="lazy" class="lang-icon me-1" width="48"
           height="48" alt="Switcher icons" src="/icons/moon.png">
    }
    @if (_themeService.currentTheme() === ThemeType.Light) {
      <img loading="lazy" class="lang-icon me-1" width="48"
           height="48" alt="Switcher icons" src="/icons/sun.png">
    }
    <app-theme-switcher></app-theme-switcher>
  </div>
  <div #langDiv class="me-1" style="position: relative;">
    <button type="button" aria-label="Lang menu"
            class="lang-button-setup d-flex align-items-center p-2 me-2"
            (click)="toggleLangSection()">
      <img loading="lazy" width="24"
           height="24" class="lang-icon me-2" alt="Country image"
           [src]="setCurrentFlag()"
      />
      <p>{{ 'headerComponent.headerLangButtonLabel' | translateFallback: 'Język' }}</p>
    </button>
    <div
      class="lang-list-wrapper animated-dropdown d-flex flex-column p-2"
      [class.open]="_langChangeService.isLangListOpen()">
      @for (item of langOptionList; track $index) {
        <button
          [aria-label]="item.alt"
          type="button"
          class="d-flex align-items-center lang-button mt-1 mb-1"
          (click)="_langChangeService.onChangeLang(item.id)">
          <img
            width="24"
            height="24"
            loading="lazy"
            class="lang-icon me-3"
            [alt]="item.alt"
            [src]="item.img" />
          <p>
            {{ item.label | translateFallback: item.fallback }}
          </p>
        </button>
      }
    </div>
  </div>
  <div #optionDiv style="position: relative;">
    <button type="button" class="burger-button" aria-label="Toggle menu"
            (click)="toggleHeaderMenu()">
      <svg class="burger-icon" width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 7h16M4 12h16M4 17h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <div
      class="header-list-wrapper animated-dropdown"
      [class.open]="isHeaderListOpen()">
      @for (item of menuOptionList; track $index) {
        <button
          type="button"
          class="d-flex align-items-center menu-buttons mt-2 mb-2"
          (click)="routeToSelectedPage(item.route)">
          <img
            width="24"
            height="24"
            loading="lazy"
            class="lang-icon me-3"
            alt="Menu options"
            [src]="item.icon" />
          <span>
        {{ item.label | translateFallback: item.fallback }}
      </span>
        </button>
      }
    </div>
  </div>
</header>
